<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Brad Cooley — Lead Senior Data Engineer</title>

    <meta
      name="description"
      content="Brad Cooley — Lead Data Engineer at Mutually Human, based in Grand Rapids, MI. Building elegant, durable solutions to complex problems."
    />
    <meta name="theme-color" content="#f8f7f4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f0f0e" media="(prefers-color-scheme: dark)" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Brad Cooley — Lead Senior Data Engineer" />
    <meta
      property="og:description"
      content="Personal portfolio of Brad Cooley, Lead Data Engineer at Mutually Human."
    />
    <meta property="og:url" content="https://brad.cooley.dev" />
    <meta property="og:image" content="https://brad.cooley.dev/assets/img/headshot.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Brad Cooley — Lead Senior Data Engineer" />
    <meta
      name="twitter:description"
      content="Personal portfolio of Brad Cooley, Lead Data Engineer at Mutually Human."
    />
    <meta name="twitter:image" content="https://brad.cooley.dev/assets/img/headshot.png" />

    <link rel="canonical" href="https://brad.cooley.dev/" />

    <!-- Set theme before paint to prevent flash -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem("theme");
          var d = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.setAttribute("data-theme", s || (d ? "dark" : "light"));
        } catch (_) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
